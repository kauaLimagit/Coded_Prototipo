<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="imgs/coded_logo.png" type="image/x-icon">
    <title>Home aluno</title>
</head>

<body>
    <header class="header-user">
        <div class="header-item">
            <h3>Nome-Escola</h3>
        </div>
        <div class="header-item area-aluno">
            <h3>Área do Aluno</h3>
        </div>
        <div class="header-item">
            <img class="profile-button" src="imgs/profile-icon.png" onclick="perfil()" alt="" width="30px">
        </div>
    </header>

    <div id="navbarlateral" class="none">

        <div class="secao-aba">
            <img src="imgs/menu_hamburguer.png" alt="" id="hamburguer" onclick="hamburguer()">
        </div>

        <div class="secao-aba">

            <img src="./imgs/home.png" alt="" id="home">

            <a href="./login_aluno.html">
                <h3>Home</h3>
            </a>

        </div>

        <div class="secao-aba">

            <img src="./imgs/book.png" alt="" id="atividade">

            <a href="./atividades.html">
                <h3>Atividades</h3>
            </a>

        </div>

        <div class="secao-aba">

            <img src="./imgs/openbook.png" alt="" id="material">

            <a href="./material.html">
                <h3>Material</h3>
            </a>

        </div>

        <div class="secao-aba">

            <img src="./imgs/task.png" alt="" id="provas">

            <a href="./provas.html">
                <h3>Provas</h3>
            </a>

        </div>

        <div class="secao-aba">

            <img src="./imgs/calendar.png" alt="" id="calendario">

            <a href="./calendariomy.html">
                <h3>CalendarioMy</h3>
            </a>

        </div>

    </div>

    <section class="field">
        <div class="field-title">
            <h2>Calendario MY </h2>
        </div>

        <center>
            <div id="calendario">
                <table id="table">
                    <div class="cal"></div>
                    
                    <tr>
                        <tH class="weekend">DOM</tH>
                        <tH class="week">SEG</tH>
                        <th class="week">TER</th>
                        <th class="week">QUA</th>
                        <th class="week">QUI</th>
                        <th class="week">SEX</th>
                        <th class="weekend">SAB</th>
                    </tr>
                </table>
            </div>
        </center>

        <div id="legenda">
            <h4>Legenda</h4>

            <div class="avisos">
                <div class="bolinha">
                    <div class="bola laranja"></div>
                    <p>Atividades</p>
                </div>

                <div class="bolinha">
                    <div class="bola verde"></div>
                    <p>Provas</p>
                </div>

            </div>
        </div>

        <div class="finish-activity"></div>

    </section>

    <footer>
        <p>© CODED - todos os direitos reservados</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
