<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="style.css">
<body>
    <div class="container">
        <div class="card">
            <h1>Cadastro</h1>

            <div id="msgError" style="display:none; color:red;"></div>
            <div id="msgSuccess" style="display:none; color:green;"></div>

            <div class="label-float">
                <input type="text" id="id" placeholder=" " required />
                <label id="labelId">Id</label>
            </div>

            <div class="label-float">
                <input type="text" id="E-mail" placeholder=" " required />
                <label id="labelEmail">E-mail</label>
            </div>

            <div class="campo-senha label-float">
                <input type="password" id="senha" placeholder=" " required />
                <label id="labelSenha">Senha</label>
                <i id="verSenha" class="fa fa-eye" aria-hidden="true"></i>
            </div>

            <div class="campo-senha label-float">
                <input type="password" id="confirmSenha" placeholder="" required />
                <label id="labelConfirmSenha" for="confirmSenha">Confirmar senha</label>
            </div>

            <div class="justify-center">
                <button onclick="cadastrar()">Cadastrar</button>
            </div>
        </div>
    </div>

</body>
 <script src="script.js"></script>
</html>
