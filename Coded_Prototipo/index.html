<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Home</title>
</head>
<body>
    <header id="header-main">
        <div id="header-options-left">
            <div class="header-option">
                <a href="">Contato</a>
            </div>
            <div class="header-option">
                <a href="">Sobre</a>
            </div>
            <div class="header-option">
                <a href="">Serviços CODED</a>
            </div>
        </div>
        <div id="header-logo-right">
            <h3 id="company-name">CODED</h3>
        </div>
    </header>
    <main id="main-home">
        <div id="presentation-coded">
            <img src="imgs/coded_logo.png" alt="" id="coded-img-main">
            <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Laboriosam, ea corporis. Quidem, 
                doloribus odit iusto laboriosam reiciendis incidunt perferendis. Suscipit nesciunt quae 
                ducimus quasi vel commodi itaque perferendis harum tempore.</p>
        </div>
        <div id="login-section">
            <div id="login-area">
                <div id="inputs">
                    <h3>LOGIN</h3>
                    <input type="text" placeholder="Digite seu ID" id="identificacao">
                    <input type="password" placeholder="Digite sua senha" id="senha"><br>

                    <button onclick="logar()">ENTRAR</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
